project:
  type: book
  output-dir: docs
  render:
    - "*.qmd"       # Render all QMDs in the root
    - "!_dev/*"     # Explicitly exclude the dev folder (double-safety)
    - "!README.md"  # Standard exclusion for info files

book:
  title: "MVR Geospatial Data Science User Guide"
  author: 
    - Michael Dougherty, Geographer
    - Barrie Chileen Martinez, Geographer
  date: "4/9/2026"
  repo-url: https://github.com/MVR-GIS/MVR-User-Guide
  page-navigation: false
  search: true

  chapters:
    - index.qmd
    - part: "Git Repos"
      chapters:
        - repo-gpg-commit-signing.qmd
        - repo-create-generic-python-repo.qmd
        - repo-create-arcgis-python-repo.qmd
        - repo-create-r-repo.qmd
    - part: "R Projects"
      chapters:
        - r-Positron-getting-started.qmd
        - r-RStudio-getting-started.qmd
        - r-ROracle-setup.qmd
        - r-deploy-shiny.qmd
        - r-Posit-Cloud-admin.qmd
    - part: "Containers"
      chapters: 
        - con-podman.qmd
    - part: "AI Workflows"
      chapters:
        - ai-reproducibleai.qmd
        - ai-workflows.qmd
    - part: "Data Governance"
      chapters:
        - gov-open-source-software.qmd
        - gov-dbt-setup.qmd
        - gov-sbom.qmd
    - part: "Bibliography"
      chapters:
        - bib-zotero.qmd
    - part: "Foundry Workflows"
      chapters:
        - fnd-tag-documents.qmd
        - fnd-pdf-parse.qmd
        - fnd-chunking.qmd
        - fnd-chunk-export.qmd
  appendices:
    - ref-references.qmd

sidebar:
  style: "docked"
  background: light
page-footer:
  left: "Made with love by USACE"
  background: light

bibliography: [ref-references.bib]

format:
  html:
    number-sections: true
    number-depth: 2
    theme:
      light: flatly
      dark: darkly
    respect-user-color-scheme: true
    highlight-style: arrow

editor: source
